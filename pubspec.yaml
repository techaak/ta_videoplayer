name: ta_videoplayer
description: "A production-grade Flutter video player supporting YouTube, Network, and Local videos with Reels-style preloading."
version: 1.0.0
homepage: https://github.com/techaak/ta_videoplayer

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  video_player: ^2.11.1
  youtube_explode_dart: ^3.1.0
  flutter_cache_manager: ^3.4.1
  path_provider: ^2.1.5
  visibility_detector: ^0.4.0+2
  wakelock_plus: ^1.6.0
  screen_brightness: ^2.1.8
  volume_controller: ^3.5.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
