name: ta_videoplayer
description: "A production-grade Flutter video player supporting YouTube, Network, and Local videos with Reels-style preloading."
version: 0.0.1
homepage: https://github.com/your-repo/ta_videoplayer

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  video_player: ^2.8.1
  youtube_explode_dart: ^2.2.2
  flutter_cache_manager: ^3.3.1
  path_provider: ^2.1.1
  visibility_detector: ^0.4.0+2
  wakelock_plus: ^1.1.4
  screen_brightness: ^1.0.1
  volume_controller: ^2.0.7
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
